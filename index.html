<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juego Silvia Ponce</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }

body {
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(-45deg, #ff69b4, #ff1493, #ff85c1, #ff4da6);
    background-size: 400% 400%;
    animation: fondoAnimado 10s ease infinite;
}

@keyframes fondoAnimado {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

#capa-inicio, #capa-perder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(6px);
    z-index: 10000;
}

.btn-accion {
    padding: 18px 38px;
    font-size: 22px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #ff1493;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.25s ease;
}

.btn-accion:hover {
    transform: scale(1.1);
}

#marcador {
    position: absolute;
    top: 0;
    width: 100%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    color: #ff1493;
    display: none;
    justify-content: space-around;
    padding: 15px;
    font-weight: bold;
    font-size: 18px;
    z-index: 5000;
}

.obj {
    position: absolute;
    font-weight: bold;
    will-change: transform;
}

.corazon { font-size: 65px; }
.malo { font-size: 55px; }
.relleno { font-size: 18px; opacity: 0.8; pointer-events: none; }

.final {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(255,20,147,0.95);
    z-index: 11000;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    padding: 25px;
}
</style>
</head>

<body>

<div id="marcador">
❤️ <span id="p">0</span>/30 | ⏱️ <span id="t">40</span>s
</div>

<div id="capa-inicio">
    <h1 style="color:white; margin-bottom: 20px; text-align: center;">
        MINI JUEGO PARA<br>SILVIA PONCE
    </h1>
    <button class="btn-accion" onclick="iniciar()">EMPEZAR</button>
</div>

<div id="capa-perder" style="display:none;">
    <h1 style="color:white; margin-bottom: 20px;">¡CASI, LOQUITA!</h1>
    <button class="btn-accion" onclick="iniciar()">VOLVER A JUGAR</button>
</div>

<div id="paso1" class="final">
    <p style="font-size: 30px; font-weight: bold; margin-bottom: 30px;">
        TE GANASTE UN CHOCOLATE LOQUITA ❤️
    </p>
    <button class="btn-accion" onclick="mostrarPaso2()">SIGUIENTE</button>
</div>

<div id="paso2" class="final">
    <p style="font-size: 28px; font-weight: bold; margin-bottom: 10px;">
        TE AMO MUCHO Y ASÍ SERÁ SIEMPRE LOQUITA
    </p>
    <p style="font-size: 18px; margin-bottom: 40px; opacity: 0.9;">
        att: carlo
    </p>
    <button class="btn-accion" onclick="reiniciarTodo()" style="font-size: 18px; padding: 15px 30px;">
        VOLVER A JUGAR
    </button>
</div>

<script>
var pts = 0;
var time = 40;
var activo = false;
var objetos = [];
var lastTime = 0;
var relojInterval;
var spawnInterval;

function iniciar() {
    activo = true;
    pts = 0;
    time = 40;
    objetos = [];
    lastTime = 0;

    document.getElementById('p').innerText = "0";
    document.getElementById('t').innerText = "40";

    document.getElementById('capa-inicio').style.display = 'none';
    document.getElementById('capa-perder').style.display = 'none';
    document.getElementById('paso1').style.display = 'none';
    document.getElementById('paso2').style.display = 'none';
    document.getElementById('marcador').style.display = 'flex';

    clearInterval(relojInterval);
    clearInterval(spawnInterval);

    relojInterval = setInterval(() => {
        if(!activo) return;
        time--;
        document.getElementById('t').innerText = time;
        if(time <= 0) terminar(false);
    }, 1000);

    spawnInterval = setInterval(spawn, 500);

    requestAnimationFrame(loop);
}

function spawn() {
    if(!activo) return;

    var d = document.createElement('div');
    var r = Math.random();
    var tipo = r > 0.4 ? 'corazon' : (r < 0.2 ? 'malo' : 'relleno');
    d.className = 'obj ' + tipo;

    if(tipo === 'corazon') {
        d.innerHTML = '❤️';
        d.onclick = () => {
            pts++;
            document.getElementById('p').innerText = pts;
            eliminarObjeto(d);
            if(pts >= 30) terminar(true);
        };
    } 
    else if(tipo === 'malo') {
        d.innerHTML = '🖤';
        d.onclick = () => {
            pts = Math.max(0, pts - 2);
            document.getElementById('p').innerText = pts;
            eliminarObjeto(d);
        };
    } 
    else {
        d.innerHTML = 'TE AMO SILVIA';
        d.style.color = "#fff";
    }

    d.style.left = Math.random() * (window.innerWidth - 80) + 'px';
    d.style.top = '-80px';

    document.body.appendChild(d);

    objetos.push({
        el: d,
        y: -80,
        speed: tipo === 'relleno' ? 80 : 65
    });
}

function eliminarObjeto(elemento) {
    elemento.remove();
    objetos = objetos.filter(o => o.el !== elemento);
}

function loop(timestamp) {
    if(!activo) return;

    if(!lastTime) lastTime = timestamp;
    var delta = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    objetos.forEach(obj => {
        obj.y += obj.speed * delta;
        obj.el.style.transform = `translateY(${obj.y}px)`;

        if(obj.y > window.innerHeight) {
            obj.el.remove();
        }
    });

    objetos = objetos.filter(o => o.y < window.innerHeight);

    requestAnimationFrame(loop);
}

function terminar(victoria) {
    activo = false;
    clearInterval(relojInterval);
    clearInterval(spawnInterval);

    document.getElementById('marcador').style.display = 'none';
    document.querySelectorAll('.obj').forEach(o => o.remove());

    if(victoria) {
        document.getElementById('paso1').style.display = 'flex';
    } else {
        document.getElementById('capa-perder').style.display = 'flex';
    }
}

function mostrarPaso2() {
    document.getElementById('paso1').style.display = 'none';
    document.getElementById('paso2').style.display = 'flex';
}

function reiniciarTodo() {
    document.getElementById('paso2').style.display = 'none';
    document.getElementById('capa-inicio').style.display = 'flex';
}
</script>

</body>
</html>
